<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🔮Светлана|Таро🩸 🃏Расклады🃏</title>
    <!-- Локальная иконка -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" sizes="32x32">
    <!-- Локальные стили -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Локальный скрипт анимации фона -->
    <script src="js/tgwallpaper.min.js"></script>
</head>
<body>
    
    <!-- ИДЕАЛЬНАЯ ШАПКА TELEGRAM -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <!-- Оригинальная векторная иконка Telegram нужного размера -->
                <svg width="36" height="36" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="120" cy="120" r="120" fill="#2AABEE"/>
                    <path d="M54.3 118.8L166.5 75.6C171.7 73.6 176.3 76.9 174.6 82.2L155.5 172.3C154 179 150.1 180.6 144.5 177.5L114.1 155.1L99.5 169.2C97.9 170.8 96.5 172.2 93.3 172.2L95.5 141.2L151.9 90.3C154.4 88.1 151.4 86.8 148.1 89L78.3 132.9L48.3 123.5C41.8 121.5 41.7 117 49.7 113.9H54.3Z" fill="white"/>
                </svg>
                <span class="header-title">Telegram</span>
            </div>
            <!-- Кнопка ЗАГРУЗИТЬ (ведет в бота) -->
            <a class="btn-download" tracker>ЗАГРУЗИТЬ</a>
        </div>
    </header>

    <!-- Холст для градиентной анимации -->
    <canvas id="tgme_background" class="tgme_background default" width="50" height="50" data-colors="dbddbb,6ba587,d5d88d,88b884"></canvas>
    
    <!-- Слой с паттерном (рисунками Telegram) -->
    <div class="bg"></div>

    <main>
        <div class="banner">
            <!-- Локальная аватарка -->
            <img class="avatar" src="images/avatar.jpg" alt="Svetlana Taro">
            
            <h1 class="title">🔮Светлана|Таро🩸 🃏Расклады🃏</h1>
            <div class="members">TaroAwards 2025/26 | 15 лет практики</div>
            
            <p class="description">
                Это знак! Вы не просто так это увидели. Сегодня последний день я делаю бесплатный расклад
<br>Осталось 7 мест
            </p>
            
            <!-- Главная кнопка НАПИСАТЬ (ведет в бота) -->
            <a class="openButton redir" tracker>НАПИСАТЬ</a>
        </div>
    </main>

    <!-- Запуск локальной анимации -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var tme_bg = document.getElementById('tgme_background');
            if (tme_bg && window.TWallpaper) {
                window.TWallpaper.init(tme_bg);
                window.TWallpaper.animate(true);
                window.onfocus = function(){ window.TWallpaper.update(); };
            }
        });
    </script>
</body>
</html>
